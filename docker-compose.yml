name: ${NETWORK}-axelar-relayer-solana

services:
  ingestor:
    build:
      context: .
      args:
        BINARY_NAME: ingestor
        FEATURES: ${NETWORK}
    env_file:
      - .env
    restart: always

  includer:
    build:
      context: .
      args:
        BINARY_NAME: includer
        FEATURES: ${NETWORK}
    env_file:
      - .env
    restart: always

  subscriber:
    build:
      context: .
      args:
        BINARY_NAME: subscriber
        FEATURES: ${NETWORK}
    env_file:
      - .env
    restart: always

  alt_manager:
    build:
      context: .
      args:
        BINARY_NAME: alt_manager
        FEATURES: ${NETWORK}
    env_file:
      - .env
    restart: always

  cu_price_calculator:
    build:
      context: .
      args:
        BINARY_NAME: cu_price_calculator
        FEATURES: ${NETWORK}
    env_file:
      - .env
    restart: always

networks:
  axelar-relayer:
    name: ${NETWORK}-axelar-relayer-solana
